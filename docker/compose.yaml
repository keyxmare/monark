name: monark

services:
  backend:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      target: dev
    depends_on:
      database:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      mercure:
        condition: service_healthy
    env_file:
      - .env
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monark-backend.rule=Host(`api.monark.localhost`)"
      - "traefik.http.services.monark-backend.loadbalancer.server.port=8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-changeme}@database:5432/${POSTGRES_DB:-monark}?serverVersion=17
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/%2f/messages
      RABBITMQ_MANAGEMENT_URL: http://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:15672
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: http://mercure.monark.localhost/.well-known/mercure
      MERCURE_JWT_SECRET: '!ChangeThisMercureHubJWTSecretKey!'
      CORS_ALLOW_ORIGIN: '^https?://(localhost|127\.0\.0\.1|[\w-]+\.localhost)(:[0-9]+)?$$'
    healthcheck:
      test: ["CMD-SHELL", "php-fpm-healthcheck || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 30s

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend/Dockerfile
      target: dev
    depends_on:
      - backend
    env_file:
      - .env
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monark-frontend.rule=Host(`monark.localhost`)"
      - "traefik.http.services.monark-frontend.loadbalancer.server.port=3000"
    environment:
      VITE_API_BASE_URL: http://api.monark.localhost/api/v1
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s

  database:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-monark}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-monark}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  rabbitmq:
    image: rabbitmq:4-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monark-rabbitmq.rule=Host(`rabbitmq.monark.localhost`)"
      - "traefik.http.services.monark-rabbitmq.loadbalancer.server.port=15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  mercure:
    image: dunglas/mercure
    restart: unless-stopped
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monark-mercure.rule=Host(`mercure.monark.localhost`)"
      - "traefik.http.services.monark-mercure.loadbalancer.server.port=80"
    environment:
      SERVER_NAME: ':80'
      MERCURE_PUBLISHER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_SUBSCRIBER_JWT_KEY: '!ChangeThisMercureHubJWTSecretKey!'
      MERCURE_EXTRA_DIRECTIVES: |
        anonymous
        cors_origins http://monark.localhost
    command: /usr/bin/caddy run --config /etc/caddy/dev.Caddyfile
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    volumes:
      - mercure-data:/data
      - mercure-config:/config

  messenger-consumer:
    build:
      context: ..
      dockerfile: docker/backend/Dockerfile
      target: dev
    command: sh -c 'APP_DEBUG=0 php bin/console cache:warmup --env=prod 2>/dev/null; APP_DEBUG=0 php -d memory_limit=1G bin/console messenger:consume async --env=prod --memory-limit=1G -vv'
    restart: always
    tmpfs:
      - /app/var/cache
    deploy:
      replicas: ${MESSENGER_CONSUMERS:-1}
    depends_on:
      backend:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-app}:${POSTGRES_PASSWORD:-changeme}@database:5432/${POSTGRES_DB:-monark}?serverVersion=17
      MESSENGER_TRANSPORT_DSN: amqp://${RABBITMQ_DEFAULT_USER:-guest}:${RABBITMQ_DEFAULT_PASS:-guest}@rabbitmq:5672/%2f/messages
      MERCURE_URL: http://mercure/.well-known/mercure
      MERCURE_PUBLIC_URL: http://mercure.monark.localhost/.well-known/mercure
      MERCURE_JWT_SECRET: '!ChangeThisMercureHubJWTSecretKey!'

networks:
  traefik:
    external: true

volumes:
  postgres-data:
  rabbitmq-data:
  mercure-data:
  mercure-config:
