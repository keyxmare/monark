services:
  backend:
    volumes:
      - ../backend:/app
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      XDEBUG_MODE: debug,coverage
      XDEBUG_CONFIG: client_host=host.docker.internal client_port=9003
    ports:
      - "9003:9003"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    command: >
      sh -c "composer install --no-interaction &&
             php -S 0.0.0.0:8000 -t public"

  frontend:
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    command: >
      sh -c "pnpm install &&
             pnpm dev --host 0.0.0.0"

  database:
    ports:
      - "5432:5432"

  messenger-consumer:
    volumes:
      - ../backend:/app

volumes:
  frontend-node-modules:
