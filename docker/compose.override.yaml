services:
  backend:
    volumes:
      - ../backend:/app
    environment:
      APP_ENV: dev
      APP_DEBUG: 1
      XDEBUG_MODE: debug,coverage
      XDEBUG_CONFIG: client_host=host.docker.internal client_port=9003
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    command: >
      sh -c "composer install --no-interaction &&
             php -S 0.0.0.0:8000 -t public"

  frontend:
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    environment:
      CI: "true"
    command: >
      sh -c "if ! node -e \"require.resolve('vite')\" 2>/dev/null; then
               echo '[entrypoint] node_modules incomplete, wiping and reinstalling';
               rm -rf node_modules;
             fi &&
             pnpm install --frozen-lockfile &&
             pnpm dev --host 0.0.0.0"

  messenger-consumer:
    volumes:
      - ../backend:/app

volumes:
  frontend-node-modules:
