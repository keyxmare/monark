security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto

    providers:
        app_user_provider:
            entity:
                class: App\Identity\Domain\Model\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        api:
            pattern: ^/api
            stateless: true
            lazy: true
            provider: app_user_provider
            json_login:
                check_path: /api/auth/login
                username_path: email
                password_path: password
                success_handler: App\Identity\Infrastructure\Security\LoginSuccessHandler
                failure_handler: App\Identity\Infrastructure\Security\LoginFailureHandler
            access_token:
                token_handler: App\Identity\Infrastructure\Security\ApiTokenHandler
            logout:
                path: /api/auth/logout

        main:
            lazy: true

    access_control:
        - { path: ^/api/auth/login, roles: PUBLIC_ACCESS }
        - { path: ^/api/auth/register, roles: PUBLIC_ACCESS }
        - { path: ^/healthz, roles: PUBLIC_ACCESS }
        - { path: ^/readyz, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }
