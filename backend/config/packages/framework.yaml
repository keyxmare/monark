framework:
    secret: '%env(APP_SECRET)%'
    csrf_protection: true
    http_method_override: false
    handle_all_throwables: true

    session:
        handler_id: null
        cookie_secure: auto
        cookie_samesite: lax
        storage_factory_id: session.storage.factory.native

    http_client:
        scoped_clients:
            external_api.client:
                scope: 'https?://.+'
                retry_failed:
                    enabled: true
                    max_retries: 3
                    delay: 1000
                    multiplier: 2
                    max_delay: 10000
                    http_codes:
                        - { code: 429, methods: ['GET'] }
                        - { code: 500, methods: ['GET'] }
                        - { code: 502, methods: ['GET'] }
                        - { code: 503, methods: ['GET'] }
                        - { code: 504, methods: ['GET'] }

    php_errors:
        log: true

    validation:
        email_validation_mode: html5

    default_locale: fr
    translator:
        default_path: '%kernel.project_dir%/translations'
        fallbacks:
            - en

when@test:
    framework:
        test: true
