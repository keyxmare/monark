name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  DC: docker compose -f docker/compose.yaml -f docker/compose.override.yaml -f docker/compose.ci.yaml

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp docker/.env.example docker/.env
      - run: chmod -R a+w backend
      - run: ${{ env.DC }} build backend
      - run: ${{ env.DC }} up -d backend
      - run: ${{ env.DC }} exec -T backend composer install --no-interaction
      - name: CS Fixer
        run: ${{ env.DC }} exec -T backend php vendor/bin/php-cs-fixer fix --dry-run --diff
      - name: PHPStan
        run: ${{ env.DC }} exec -T backend php vendor/bin/phpstan analyse --memory-limit=512M
      - run: ${{ env.DC }} exec -T backend php bin/console doctrine:migrations:migrate --no-interaction
      - name: Tests with coverage
        run: >
          ${{ env.DC }} exec -T backend
          php vendor/bin/pest --coverage --coverage-clover coverage/clover.xml --min=80
      - name: Coverage summary
        if: always()
        run: |
          COVERAGE=$(${{ env.DC }} exec -T backend php -r "
            \$xml = simplexml_load_file('coverage/clover.xml');
            \$m = \$xml->project->metrics;
            \$stmts = (int) \$m['statements'];
            echo \$stmts > 0 ? round((int) \$m['coveredstatements'] / \$stmts * 100, 2) : '0';
          ")
          echo "### Backend Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage/clover.xml
          retention-days: 7
      - name: Deptrac
        run: ${{ env.DC }} exec -T backend php vendor/bin/deptrac analyse
      - name: Composer audit
        run: ${{ env.DC }} exec -T backend composer audit

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp docker/.env.example docker/.env
      - run: chmod -R a+w frontend
      - run: ${{ env.DC }} build frontend
      - run: ${{ env.DC }} up -d frontend
      - run: ${{ env.DC }} exec -T frontend pnpm install
      - name: Lint
        run: ${{ env.DC }} exec -T frontend pnpm lint
      - name: Format check
        run: ${{ env.DC }} exec -T frontend pnpm format:check
      - name: Tests with coverage
        run: >
          ${{ env.DC }} exec -T frontend
          pnpm vitest run --coverage --coverage.reporter=text --coverage.reporter=json-summary
      - name: Coverage summary
        if: always()
        run: |
          COVERAGE=$(${{ env.DC }} exec -T frontend node -e "
            const s = JSON.parse(require('fs').readFileSync('coverage/coverage-summary.json', 'utf8'));
            console.log(s.total.lines.pct);
          ")
          echo "### Frontend Coverage: ${COVERAGE}%" >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-coverage
          path: frontend/coverage/coverage-summary.json
          retention-days: 7
      - name: pnpm audit
        run: ${{ env.DC }} exec -T frontend pnpm audit

  coverage-report:
    name: Coverage Report
    if: github.event_name == 'pull_request'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: backend-coverage
        continue-on-error: true
      - uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: frontend-coverage
        continue-on-error: true
      - name: Build coverage comment
        id: coverage
        run: |
          BACKEND="N/A"
          BACKEND_ICON="—"
          if [ -f backend-coverage/clover.xml ]; then
            BACKEND=$(python3 -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('backend-coverage/clover.xml').getroot()
          m = root.find('.//project/metrics')
          stmts = int(m.get('statements', 0))
          covered = int(m.get('coveredstatements', 0))
          print(round(covered / max(1, stmts) * 100, 2))
          ")
            if (( $(echo "$BACKEND >= 80" | bc -l) )); then
              BACKEND_ICON="≥ 80% ✅"
            else
              BACKEND_ICON="< 80% ❌"
            fi
          fi

          FRONTEND="N/A"
          if [ -f frontend-coverage/coverage-summary.json ]; then
            FRONTEND=$(python3 -c "
          import json
          with open('frontend-coverage/coverage-summary.json') as f:
              data = json.load(f)
          print(data['total']['lines']['pct'])
          ")
          fi

          {
            echo 'COMMENT<<EOF'
            echo '<!-- coverage-report -->'
            echo '## Coverage Report'
            echo ''
            echo '| Stack | Lines | Gate |'
            echo '|---|---|---|'
            echo "| Backend (PHP) | ${BACKEND}% | ${BACKEND_ICON} |"
            echo "| Frontend (TS) | ${FRONTEND}% | — |"
            echo ''
            echo "_Updated for commit ${{ github.event.pull_request.head.sha }}_"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"
      - name: Post or update PR comment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR=${{ github.event.pull_request.number }}
          MARKER="<!-- coverage-report -->"
          EXISTING=$(gh api repos/${{ github.repository }}/issues/${PR}/comments --jq ".[] | select(.body | startswith(\"${MARKER}\")) | .id" | head -1)

          if [ -n "$EXISTING" ]; then
            gh api repos/${{ github.repository }}/issues/comments/${EXISTING} -X PATCH -f body="${{ steps.coverage.outputs.COMMENT }}"
          else
            gh pr comment ${PR} --body "${{ steps.coverage.outputs.COMMENT }}"
          fi

  report-metrics:
    name: Report Build Metrics
    if: github.event_name == 'push'
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: backend-coverage
          path: backend-coverage
        continue-on-error: true
      - uses: actions/download-artifact@v8
        with:
          name: frontend-coverage
          path: frontend-coverage
        continue-on-error: true
      - name: Post metrics to Monark
        if: env.MONARK_API_URL != ''
        continue-on-error: true
        env:
          MONARK_API_URL: ${{ secrets.MONARK_API_URL }}
          MONARK_API_TOKEN: ${{ secrets.MONARK_API_TOKEN }}
          MONARK_PROJECT_ID: ${{ secrets.MONARK_PROJECT_ID }}
        run: |
          BACKEND=""
          if [ -f backend-coverage/clover.xml ]; then
            BACKEND=$(python3 -c "
          import xml.etree.ElementTree as ET
          root = ET.parse('backend-coverage/clover.xml').getroot()
          m = root.find('.//project/metrics')
          stmts = int(m.get('statements', 0))
          covered = int(m.get('coveredstatements', 0))
          print(round(covered / max(1, stmts) * 100, 2))
          ")
          fi

          FRONTEND=""
          if [ -f frontend-coverage/coverage-summary.json ]; then
            FRONTEND=$(python3 -c "
          import json
          with open('frontend-coverage/coverage-summary.json') as f:
              data = json.load(f)
          print(data['total']['lines']['pct'])
          ")
          fi

          curl -sf -X POST "${MONARK_API_URL}/api/activity/projects/${MONARK_PROJECT_ID}/build-metrics" \
            -H "Authorization: Bearer ${MONARK_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"commitSha\": \"${GITHUB_SHA:0:40}\",
              \"ref\": \"${GITHUB_REF_NAME}\",
              $([ -n "$BACKEND" ] && echo "\"backendCoverage\": $BACKEND,")
              $([ -n "$FRONTEND" ] && echo "\"frontendCoverage\": $FRONTEND,")
              \"mutationScore\": null
            }"

  build:
    name: Build Production
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp docker/.env.example docker/.env
      - run: docker compose -f docker/compose.yaml -f docker/compose.prod.yaml build
