name: Security Audit

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

permissions:
  contents: read

env:
  DC: docker compose -f docker/compose.yaml -f docker/compose.override.yaml

jobs:
  audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp docker/.env.example docker/.env
      - run: ${{ env.DC }} build
      - run: ${{ env.DC }} up -d
      - run: ${{ env.DC }} exec -T backend composer install --no-interaction
      - run: ${{ env.DC }} exec -T backend composer audit
      - run: ${{ env.DC }} exec -T frontend pnpm install
      - run: ${{ env.DC }} exec -T frontend pnpm audit
