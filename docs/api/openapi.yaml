openapi: 3.1.0

info:
  title: Monark API
  version: 0.1.0
  description: Developer hub API for project monitoring, dependency tracking, and technical assessments.

servers:
  - url: http://localhost:8000/api
    description: Development
  - url: https://api.monark.dev/api
    description: Production

paths:
  /health:
    get:
      summary: Health check
      operationId: health
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readiness:
    get:
      summary: Readiness check
      operationId: readiness
      tags:
        - System
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  database:
                    type: string
                    example: ok
                  rabbitmq:
                    type: string
                    example: ok

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []

tags:
  - name: System
    description: Health and readiness endpoints
