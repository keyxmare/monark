openapi: 3.1.0

info:
  title: Monark API
  version: 0.1.0
  description: Developer hub API for project monitoring, dependency tracking, and technical assessments.

servers:
  - url: http://localhost:8000/api
    description: Development
  - url: https://api.monark.dev/api
    description: Production

paths:
  /health:
    get:
      summary: Health check
      operationId: health
      tags:
        - System
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /readiness:
    get:
      summary: Readiness check
      operationId: readiness
      tags:
        - System
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ready
                  database:
                    type: string
                    example: ok
                  rabbitmq:
                    type: string
                    example: ok

  /catalog/projects/{id}/scan:
    post:
      summary: Scan project for tech stacks and dependencies
      operationId: scanProject
      tags:
        - Catalog
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Scan completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScanResultResponse"
        "404":
          description: Project not found
        "422":
          description: Project is not linked to a provider

  /catalog/providers/{id}/import:
    post:
      summary: Import remote projects from a provider
      operationId: importProjects
      tags:
        - Catalog
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportProjectsInput"
      responses:
        "201":
          description: Projects imported successfully
        "404":
          description: Provider not found

  /catalog/providers/{id}/remote-projects:
    get:
      summary: List remote projects from a provider
      operationId: listRemoteProjects
      tags:
        - Catalog
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Remote projects list

  /catalog/providers/{id}/test:
    post:
      summary: Test connection to a provider
      operationId: testProviderConnection
      tags:
        - Catalog
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      connected:
                        type: boolean

  /catalog/pipelines:
    get:
      summary: List pipelines
      operationId: listPipelines
      tags:
        - Catalog
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
        - name: ref
          in: query
          description: Filter by git ref (branch or tag)
          schema:
            type: string
      responses:
        "200":
          description: Paginated pipelines list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedPipelinesResponse"

  /catalog/pipelines/{id}:
    get:
      summary: Get pipeline details
      operationId: getPipeline
      tags:
        - Catalog
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Pipeline details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PipelineResponse"
        "404":
          description: Pipeline not found

  /dependency/dependencies:
    get:
      summary: List dependencies
      operationId: listDependencies
      tags:
        - Dependency
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: per_page
          in: query
          schema:
            type: integer
            default: 20
        - name: project_id
          in: query
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Paginated dependencies list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedDependenciesResponse"

    post:
      summary: Create a dependency
      operationId: createDependency
      tags:
        - Dependency
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDependencyInput"
      responses:
        "201":
          description: Dependency created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyResponse"

  /dependency/dependencies/{id}:
    get:
      summary: Get dependency details
      operationId: getDependency
      tags:
        - Dependency
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Dependency details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyResponse"
        "404":
          description: Dependency not found

    put:
      summary: Update a dependency
      operationId: updateDependency
      tags:
        - Dependency
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateDependencyInput"
      responses:
        "200":
          description: Dependency updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DependencyResponse"
        "404":
          description: Dependency not found

    delete:
      summary: Delete a dependency
      operationId: deleteDependency
      tags:
        - Dependency
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Dependency deleted
        "404":
          description: Dependency not found

components:
  schemas:
    DependencyOutput:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        currentVersion:
          type: string
        latestVersion:
          type: string
        ltsVersion:
          type: string
        packageManager:
          type: string
          enum: [composer, npm, pip]
        type:
          type: string
          enum: [runtime, dev]
        isOutdated:
          type: boolean
        projectId:
          type: string
          format: uuid
        repositoryUrl:
          type: string
          format: uri
          nullable: true
          maxLength: 2048
        vulnerabilityCount:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    DependencyResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/DependencyOutput"

    PaginatedDependenciesResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/DependencyOutput"
            total:
              type: integer
            page:
              type: integer
            per_page:
              type: integer
            total_pages:
              type: integer

    CreateDependencyInput:
      type: object
      required:
        - name
        - currentVersion
        - latestVersion
        - ltsVersion
        - packageManager
        - type
        - isOutdated
        - projectId
      properties:
        name:
          type: string
          maxLength: 255
        currentVersion:
          type: string
          maxLength: 100
        latestVersion:
          type: string
          maxLength: 100
        ltsVersion:
          type: string
          maxLength: 100
        packageManager:
          type: string
          enum: [composer, npm, pip]
        type:
          type: string
          enum: [runtime, dev]
        isOutdated:
          type: boolean
        projectId:
          type: string
          format: uuid
        repositoryUrl:
          type: string
          format: uri
          nullable: true
          maxLength: 2048

    UpdateDependencyInput:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        currentVersion:
          type: string
          maxLength: 100
        latestVersion:
          type: string
          maxLength: 100
        ltsVersion:
          type: string
          maxLength: 100
        packageManager:
          type: string
          enum: [composer, npm, pip]
        type:
          type: string
          enum: [runtime, dev]
        isOutdated:
          type: boolean
        repositoryUrl:
          type: string
          format: uri
          nullable: true
          maxLength: 2048

    ScanResultResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            stacksDetected:
              type: integer
            dependenciesDetected:
              type: integer
            stacks:
              type: array
              items:
                type: object
                properties:
                  language:
                    type: string
                  framework:
                    type: string
                  version:
                    type: string
                    description: Language version (e.g. PHP 8.4, Node 22)
                  frameworkVersion:
                    type: string
                    description: Framework version (e.g. Symfony 8.0, Vue 3.5)
            dependencies:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  version:
                    type: string
                  packageManager:
                    type: string
                    enum: [composer, npm, pip]
                  type:
                    type: string
                    enum: [runtime, dev]

    PipelineOutput:
      type: object
      properties:
        id:
          type: string
          format: uuid
        externalId:
          type: string
        ref:
          type: string
        status:
          type: string
          enum: [pending, running, success, failed]
        duration:
          type: integer
        startedAt:
          type: string
          format: date-time
        finishedAt:
          type: string
          format: date-time
          nullable: true
        projectId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    PipelineResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          $ref: "#/components/schemas/PipelineOutput"

    PaginatedPipelinesResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items:
                $ref: "#/components/schemas/PipelineOutput"
            total:
              type: integer
            page:
              type: integer
            per_page:
              type: integer
            total_pages:
              type: integer

    ImportProjectsInput:
      type: object
      required:
        - projects
      properties:
        projects:
          type: array
          items:
            type: object
            required:
              - externalId
              - name
              - slug
            properties:
              externalId:
                type: string
              name:
                type: string
              slug:
                type: string
              description:
                type: string
                nullable: true
              repositoryUrl:
                type: string
              defaultBranch:
                type: string
                default: main
              visibility:
                type: string
                default: private

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: HMAC-SHA256

security:
  - bearerAuth: []

tags:
  - name: System
    description: Health and readiness endpoints
  - name: Catalog
    description: Projects, providers, tech stacks, and pipelines
  - name: Dependency
    description: Dependencies, versions, and vulnerability tracking
