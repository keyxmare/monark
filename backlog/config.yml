project_name: "Monark"
default_status: "To Do"
statuses: ["To Do", "In Progress", "Done"]
labels: []
definition_of_done: ["Les tests doivent passer", "Coverage 80% minimum", "Mutation 80% minimum", "Documentation mise à jour", "L'analyse de code statique doit passer"]
date_format: yyyy-mm-dd
max_column_width: 20
default_editor: "nano"
auto_open_browser: true
default_port: 6420
remote_operations: false
auto_commit: false
zero_padded_ids: 3
bypass_git_hooks: false
check_active_branches: true
active_branch_days: 30
task_prefix: "task"
